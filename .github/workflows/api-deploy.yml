name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/agent/**"
      - "packages/db/**"
      - "packages/contracts/**"
      - "packages/portfolio-content/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/api-deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "694062402452"
  ECR_REPO: portfolio-api
  EC2_INSTANCE_ID: i-08e49d550abb27e49
  DB_URL_SECRET: portfolio/database_url

concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::694062402452:role/GitHubActionsDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:latest
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install workspace deps (db only)
        # @portfolio/db plus its workspace deps (incl. @portfolio/content) is
        # all we need to run migrate + seed.
        run: pnpm install --frozen-lockfile --filter @portfolio/db...

      - name: Fetch secrets from Secrets Manager
        id: secrets
        run: |
          DB_URL=$(aws secretsmanager get-secret-value --secret-id portfolio/database_url --query SecretString --output text)
          OPENAI=$(aws secretsmanager get-secret-value --secret-id portfolio/openai_api_key --query SecretString --output text)
          echo "::add-mask::$DB_URL"
          echo "::add-mask::$OPENAI"
          echo "database_url=$DB_URL" >> "$GITHUB_OUTPUT"
          echo "openai_api_key=$OPENAI" >> "$GITHUB_OUTPUT"

      - name: Generate Prisma client
        run: pnpm --filter @portfolio/db exec prisma generate
        env:
          # Placeholder satisfies prisma.config.ts validation; generate never connects.
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: Apply Prisma migrations
        env:
          DATABASE_URL: ${{ steps.secrets.outputs.database_url }}
        run: pnpm --filter @portfolio/db exec prisma migrate deploy

      - name: Seed knowledge corpus
        # Content-hash dedup makes unchanged docs free (no re-embedding).
        # Bypasses the package script (which hardcodes --env-file=../../.env)
        # and runs tsx directly with env vars from the workflow.
        env:
          DATABASE_URL: ${{ steps.secrets.outputs.database_url }}
          OPENAI_API_KEY: ${{ steps.secrets.outputs.openai_api_key }}
        run: pnpm --filter @portfolio/db exec tsx scripts/seed-knowledge.ts

      - name: Redeploy container on EC2 via SSM
        env:
          IMAGE_URI: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:sha-${{ github.sha }}
        run: |
          # Write the on-instance script to a file (no shell expansion — IMAGE_URI is
          # substituted via envsubst afterwards). Runs as root on EC2 via SSM.
          # Reuses the instance's existing IAM permissions for ECR + Secrets Manager.
          cat > /tmp/redeploy.sh.tpl <<'EOS'
          #!/bin/bash
          set -euxo pipefail
          AWS_REGION=us-east-1
          IMAGE_URI="__IMAGE_URI__"
          REGISTRY="$(echo "$IMAGE_URI" | cut -d/ -f1)"
          aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$REGISTRY"
          docker pull "$IMAGE_URI"
          DATABASE_URL=$(aws secretsmanager get-secret-value --region "$AWS_REGION" --secret-id portfolio/database_url --query SecretString --output text)
          OPENAI_API_KEY=$(aws secretsmanager get-secret-value --region "$AWS_REGION" --secret-id portfolio/openai_api_key --query SecretString --output text)
          docker rm -f portfolio-api 2>/dev/null || true
          docker run -d \
            --name portfolio-api \
            --restart unless-stopped \
            -p 80:3001 \
            -e NODE_ENV=production \
            -e API_HOST=0.0.0.0 \
            -e API_PORT=3001 \
            -e API_CORS_ORIGINS="https://davidbautista.co,https://www.davidbautista.co" \
            -e DATABASE_URL="$DATABASE_URL" \
            -e OPENAI_API_KEY="$OPENAI_API_KEY" \
            "$IMAGE_URI"
          docker image prune -af --filter "until=24h" || true
          EOS

          sed "s|__IMAGE_URI__|${IMAGE_URI}|g" /tmp/redeploy.sh.tpl > /tmp/redeploy.sh

          # Build SSM parameters as a JSON file. CLI shorthand can't safely carry
          # multi-line scripts with embedded quotes.
          jq -Rs '{commands: [.]}' < /tmp/redeploy.sh > /tmp/ssm-params.json

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${{ github.sha }}" \
            --parameters file:///tmp/ssm-params.json \
            --query 'Command.CommandId' --output text)
          echo "SSM command: $CMD_ID"

          aws ssm wait command-executed \
            --command-id "$CMD_ID" \
            --instance-id "$EC2_INSTANCE_ID" || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query 'Status' --output text)
          echo "SSM status: $STATUS"
          echo "--- stdout ---"
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query 'StandardOutputContent' --output text | tail -30 || true
          if [ "$STATUS" != "Success" ]; then
            echo "::error::SSM redeploy failed (status: $STATUS)"
            echo "--- stderr ---"
            aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query 'StandardErrorContent' --output text
            exit 1
          fi

      - name: Smoke test via CloudFront
        run: |
          # CloudFront caches none of /chat (CachingDisabled policy), so the
          # next request hits the fresh container.
          for i in 1 2 3 4 5; do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' https://d3gcs6379sz8p0.cloudfront.net/health)
            if [ "$CODE" = "200" ]; then
              echo "health: 200 ✓"
              exit 0
            fi
            echo "health attempt $i: $CODE — retrying"
            sleep 5
          done
          echo "::error::health check did not return 200 within 25s"
          exit 1
